services:
  - type: web
    name: content-gen
    runtime: node
    buildCommand: >
      npm install &&
      VITE_API_URL="" VITE_POSTHOG_KEY=$VITE_POSTHOG_KEY VITE_POSTHOG_HOST=$VITE_POSTHOG_HOST
      npm run build -w apps/web &&
      npx prisma generate --schema=apps/api/prisma/schema.prisma &&
      npm run build -w apps/api
    startCommand: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && node apps/api/dist/apps/api/src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_REGISTRATION_SECRET
        sync: false
      - key: AI_BASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://eu.posthog.com
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://eu.posthog.com
      - key: NODE_ENV
        value: production
